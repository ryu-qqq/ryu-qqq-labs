# ============================================
# Docker 환경 전용 설정
# docker-compose 에서 SPRING_PROFILES_ACTIVE=docker 로 활성화
# ============================================

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/labdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: lab
    password: lab1234

    hikari:
      # ★ 실험: 이 값을 바꿔보면서 Grafana에서 관찰
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 5000
      idle-timeout: 30000
      pool-name: LabPool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: redis
      port: 6379
      timeout: 3000ms

# ============================================
# Actuator - Prometheus 메트릭 노출
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: jvm-pool-lab
