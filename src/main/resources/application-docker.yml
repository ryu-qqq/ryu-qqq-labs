# ============================================
# Docker 환경 전용 설정
# docker-compose 에서 SPRING_PROFILES_ACTIVE=docker 로 활성화
# ============================================

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/labdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: lab
    password: lab1234

    hikari:
      # ★ 실험: 이 값을 바꿔보면서 Grafana에서 관찰
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 5000
      idle-timeout: 30000
      pool-name: LabPool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true              # SQL 보기 좋게 포맷
        # 배치 인서트 설정
        jdbc:
          batch_size: 50              # 배치 크기
        order_inserts: true           # INSERT 순서대로 묶기
        order_updates: true           # UPDATE도 묶기
        batch_versioned_data: true    # @Version 엔티티도 배치
        generate_statistics: true     # 통계 수집 (쿼리 수 측정용)
        # 2차 캐시 활성화
        cache:
          use_second_level_cache: true
          use_query_cache: true
          region:
            factory_class: jcache
        javax:
          cache:
            provider: org.ehcache.jsr107.EhcacheCachingProvider

  data:
    redis:
      host: redis
      port: 6379
      timeout: 3000ms

# ============================================
# Actuator - Prometheus 메트릭 노출
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: jvm-pool-lab
