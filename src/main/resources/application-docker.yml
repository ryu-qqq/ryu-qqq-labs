# ============================================
# Docker 환경 전용 설정
# docker-compose 에서 SPRING_PROFILES_ACTIVE=docker 로 활성화
# ============================================

server:
  tomcat:
    mbeanregistry:
      enabled: true  # 톰캣 스레드 메트릭 노출

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/labdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: lab
    password: lab1234

    hikari:
      # ★ 실험: 이 값들을 바꿔가며 Grafana에서 관찰
      maximum-pool-size: 5              # 풀 최대 크기
      minimum-idle: 2                    # 최소 유지 커넥션 (웜업 효과)
      connection-timeout: 1000           # 커넥션 얻기 대기 시간 (초과시 SQLException)
      idle-timeout: 30000                # idle 커넥션 유지 시간 (초과시 제거)
      max-lifetime: 1800000              # 커넥션 최대 생명 (30분)
                                         # ★ MySQL wait_timeout(기본 28800초)보다 짧아야 함!
      keepalive-time: 300000             # idle 커넥션에 주기적 ping (5분)
      leak-detection-threshold: 3000     # 3초 이상 반납 안 하면 경고 로그 (leak 감지)
      pool-name: LabPool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: redis
      port: 6379
      timeout: 3000ms

# ============================================
# Actuator - Prometheus 메트릭 노출
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: jvm-pool-lab
